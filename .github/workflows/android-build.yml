name: Build APK

# Har push par aur manually (Actions tab -> Run workflow) APK banata hai.
on:
  push:
  workflow_dispatch:

# Release banane ke liye APK ko repo mein likhne ki permission chahiye.
permissions:
  contents: write

# Har build ko ek unique version deta hai: 1.0.<run_number>.
# github.run_number har workflow run pe 1 se badhta hai.
env:
  APP_VERSION: 1.0.${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Android SDK (cmdline-tools + licenses accepted). AGP baaki
      # platform/build-tools khud download kar leta hai.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Project mein gradle wrapper nahi hai, isliye gradle 8.7 yahin dila lete hain
      # (AGP 8.5.2 ke liye Gradle 8.7 chahiye).
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: >
          gradle assembleDebug --no-daemon --stacktrace
          -PappVersionCode=${{ github.run_number }}
          -PappVersionName=${{ env.APP_VERSION }}

      - name: Rename APK with version
        run: cp app/build/outputs/apk/debug/app-debug.apk QC_GO-v${{ env.APP_VERSION }}.apk

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: QC_GO-v${{ env.APP_VERSION }}
          path: QC_GO-v${{ env.APP_VERSION }}.apk
          if-no-files-found: error

      # Har version ka apna Release banao (purani versions bani rehti hain).
      - name: Publish versioned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: QC GO v${{ env.APP_VERSION }}
          body: |
            Automated build.
            Version: ${{ env.APP_VERSION }}
            Commit: ${{ github.sha }}
          files: QC_GO-v${{ env.APP_VERSION }}.apk
